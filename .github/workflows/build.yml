name: Build Geode Mod

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod@main

      - name: Upload Geode File
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Deco-Kuzureta-Style
          path: build/**/*.geode
