name: Build Geode Mod

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode
        uses: geode-sdk/setup-geode@main

      - name: Build
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: android64
          build-config: Release
